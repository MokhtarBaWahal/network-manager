version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./network_manager.db
      - SECRET_KEY=dev-key-change-this
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Optional: PostgreSQL Database (uncomment to use)
  # db:
  #   image: postgres:15
  #   environment:
  #     - POSTGRES_USER=network_manager
  #     - POSTGRES_PASSWORD=password
  #     - POSTGRES_DB=network_manager
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  postgres_data:
